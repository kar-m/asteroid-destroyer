<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroid Destroyer</title>
  </head>
  <body>
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="game-over" style="display: none;">
            <h1>GAME OVER</h1>
            <p>EARTH HAS BEEN DESTROYED</p>
            <button id="restart">Restart</button>
        </div>
    </div>
    <div id="aim-ui" style="display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 300px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #444; color: white; font-family: sans-serif; text-align: center; pointer-events: none;">
        <div id="power-container" style="display: none; margin-bottom: 10px;">
            <div style="margin-bottom: 5px; font-weight: bold;">POWER</div>
            <div style="width: 100%; height: 20px; background: #222; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #666;">
                <div id="power-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #00ff00, #ff0000);"></div>
                <div id="power-cursor" style="position: absolute; top: -2px; bottom: -2px; width: 4px; background: white; left: 0%; transform: translateX(-50%); box-shadow: 0 0 5px white;"></div>
            </div>
            <div style="font-size: 12px; margin-top: 5px; color: #aaa;">Press SPACE to lock</div>
        </div>
        
        <div id="angle-container" style="display: none;">
            <div style="margin-bottom: 5px; font-weight: bold;">ANGLE</div>
            <div style="width: 100%; height: 20px; background: #222; border-radius: 10px; position: relative; border: 1px solid #666;">
                <!-- Center point marker -->
                <div style="position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #666; transform: translateX(-50%); z-index: 1;"></div>
                <div id="angle-cursor" style="position: absolute; top: -2px; bottom: -2px; width: 4px; background: #00ffff; left: 50%; transform: translateX(-50%); box-shadow: 0 0 5px #00ffff; z-index: 2;"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px; color: #aaa;">
                <span>Left</span>
                <span>Straight</span>
                <span>Right</span>
            </div>
            <div style="font-size: 12px; margin-top: 5px; color: #aaa;">Press SPACE to fire</div>
        </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
