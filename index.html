<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroid Destroyer</title>
  </head>
  <body>
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="game-over" style="display: none;">
            <h1>GAME OVER</h1>
            <p>EARTH HAS BEEN DESTROYED</p>
            <button id="restart">Restart</button>
        </div>
        <div id="powerups">
            <div class="powerup disabled" id="powerup-bomb" title="Destroy nearby asteroids. Cost: 20 pts">
                <img src="/bomb.png" alt="Bomb">
                <div class="price">20</div>
            </div>
            <div class="powerup disabled" id="powerup-laser" title="Destroy all asteroids in a line. Cost: 50 pts">
                <img src="/laser.png" alt="Laser">
                <div class="price">50</div>
            </div>
            <div class="powerup disabled" id="powerup-rocket" title="Win Game! Cost: 250 pts">
                <img src="/rocket.png" alt="Rocket">
                <div class="price">250</div>
            </div>
        </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
